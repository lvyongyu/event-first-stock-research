name: CI

on:
  push:
    paths-ignore:
      - "state/**"
      - "outputs/**"
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + dev tools
        run: python -m pip install -e ".[test]"

      - name: Lint (pyflakes)
        run: python -m pyflakes src/efsr tests

      - name: Type check (mypy)
        run: python -m mypy src/efsr --ignore-missing-imports

      - name: Tests (pytest)
        run: python -m pytest -q
