name: Daily event-driven stock report

on:
  schedule:
    # Weekdays at 13:00 UTC. This is before the US market open in both EDT and EST.
    - cron: "0 13 * * 1-5"
  workflow_dispatch:

jobs:
  create-daily-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AGENT_MODE: lean
      OPENAI_MODEL: gpt-4o-mini

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute cache key
        id: cache-key
        run: |
          echo "week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      - name: Restore local cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: event-first-cache-${{ runner.os }}-${{ steps.cache-key.outputs.week }}
          restore-keys: |
            event-first-cache-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python3 -m pip install -e .

      - name: Generate watchlist
        run: python3 -u -m efsr --top 10

      - name: Commit paper portfolio database
        run: |
          if [ ! -f state/paper_portfolio.sqlite ]; then
            echo "No paper portfolio database found."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/paper_portfolio.sqlite
          if git diff --cached --quiet; then
            echo "No paper portfolio database changes to commit."
            exit 0
          fi
          git commit -m "Update paper portfolio database"
          git push

      - name: Create GitHub issue report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const outputDir = path.join(process.cwd(), "outputs");
            const report = fs
              .readdirSync(outputDir)
              .filter((name) => name.startsWith("daily_event_bottom_fishing_") && name.endsWith(".md"))
              .sort()
              .pop();

            if (!report) {
              throw new Error("No Markdown report found in outputs/");
            }

            const reportBody = fs.readFileSync(path.join(outputDir, report), "utf8");
            const date = new Date().toISOString().slice(0, 10);
            const body = `@lvyongyu Daily stock report is ready.\n\n${reportBody}`;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily US event-driven stock watchlist - ${date}`,
              body,
              assignees: ["lvyongyu"]
            });

            core.summary
              .addHeading("Daily stock report issue created")
              .addLink(issue.data.html_url, issue.data.html_url)
              .write();
